# Font
font_family JetBrainsMono Nerd Font
font_size 11

# Background (matches your blur vibe)
background #0a0a0f
background_opacity 0.6

# Foreground
foreground #cdd6f4

# Cursor
cursor #abbcda
cursor_text_color #0a0a0f

# Selection
selection_background #abbcda
selection_foreground #0a0a0f

# Borders
active_border_color   #abbcda   # your main accent
inactive_border_color #d0d4e0   # muted pastel variant

# Tabs (if you use them)
active_tab_background #abbcda
active_tab_foreground #0a0a0f
inactive_tab_background #1a1a22
inactive_tab_foreground #a6adc8

# Colors (basic palette)
color0 #0a0a0f
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #cdd6f4

color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #abbcda
color13 #f5c2e7
color14 #94e2d5
color15 #ffffff
